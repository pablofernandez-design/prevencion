<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portal SR · Cliente - Análisis</title>
<style>
  :root{
    --green:#004039;
    --green-dark:#002b26;
    --green-card:#013a33;
    --primary50:#E6ECEB;
    --brown:#6B3A27;
    --bg:#F6F7F9;
    --white:#fff;
    --n200:#E5E5E5;
    --n300:#D8DAE0;
    --n700:#666;
    --n900:#333;
    --success-50:#E8F8EF;
    --success-100:#B6E9CD;
    --success-700:#0E8343;
    --pending-bg:#FBEFC9;
    --pending-fg:#8A6B18;
    --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Aeonik",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--n900);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  .serif{font-family:Georgia,"Times New Roman",serif}

  /* ---------- App shell ---------- */
  .app{max-width:1440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

  /* ---------- Top header ---------- */
  .topbar{
    height:64px;background:var(--white);border-bottom:1px solid var(--n200);
    display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  }
  .logo{font-size:30px;color:var(--green);letter-spacing:.5px}
  .logo-svg{height:30px;width:auto;display:block;flex-shrink:0}
  .nav{display:flex;align-items:center;gap:28px;font-size:15px;color:var(--green)}
  .nav a{color:var(--green);text-decoration:none;font-weight:500}
  .nav a.active{font-weight:700}
  .nav .sep{width:1px;height:26px;background:var(--n200)}
  .user{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .user .who{font-size:13px;line-height:1.2}
  .user .who b{display:block;font-weight:600;color:var(--n900)}
  .user .who span{color:var(--n700);font-size:12px}
  .icon{width:20px;height:20px;display:inline-block;vertical-align:middle}

  /* ---------- Page ---------- */
  .page{padding:20px 24px 48px}
  .crumbs{display:flex;align-items:center;gap:8px;color:var(--n700);font-size:13px;margin-bottom:10px;flex-wrap:wrap}
  .crumbs .cur{color:var(--n900);font-weight:600}
  .crumbs svg{opacity:.5}

  .pagehead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
  .pagehead h1{font-size:26px;font-weight:400;margin:0;color:var(--n900)}
  .actions{display:flex;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 16px;border-radius:8px;font-size:14px;font-weight:500;border:1px solid var(--n300);background:var(--white);color:var(--n900);white-space:nowrap}
  .btn:hover{background:#fafafa}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff}
  .btn.primary:hover{background:#013128}
  .btn[disabled]{background:#EEF0F2;border-color:#EEF0F2;color:#AEB4BB;cursor:not-allowed}
  .btn.primary[disabled]{background:#EEF0F2;border-color:#EEF0F2;color:#AEB4BB}

  /* ---------- Landing layout ---------- */
  .landing{display:grid;grid-template-columns:224px 1fr;gap:16px;align-items:start}
  .side{display:flex;flex-direction:column;gap:14px}
  .navcard{
    background:var(--green);color:#fff;border-radius:var(--radius);padding:16px;
    min-height:112px;display:flex;flex-direction:column;gap:8px;
    text-align:left;border:none;width:100%;position:relative;transition:transform .08s;
  }
  .navcard:hover{transform:translateY(-1px)}
  .navcard .top{display:flex;align-items:flex-start;justify-content:space-between}
  .navcard .ci{width:24px;height:24px;opacity:.95}
  .navcard .badge{background:var(--success-50);color:var(--n900);font-size:14px;font-weight:500;line-height:20px;padding:2px 8px;border-radius:4px}
  .navcard h3{margin:0;font-size:22px;font-weight:500}
  .navcard .arrow{align-self:flex-end;margin-top:auto;opacity:.95}

  .main{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);box-shadow:var(--shadow)}
  .resultcard{padding:20px 24px}
  .resultcard .rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .resultcard h2{font-size:18px;font-weight:500;margin:0}
  .status{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
  .status.pending{background:var(--pending-bg);color:var(--pending-fg)}
  .status.done{background:var(--success-50);color:var(--success-700)}
  .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .meta .k{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;margin-bottom:6px}
  .meta .v{font-size:15px;font-weight:600;color:var(--n900)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--success-50);color:var(--success-700);font-size:13px;font-weight:500;padding:5px 10px;border-radius:8px}

  .previewcard{padding:20px 24px 24px}
  .pv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px}
  .pv-head h2{font-size:16px;font-weight:500;margin:0}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--n300);border-radius:8px;height:40px;padding:0 12px;width:280px;color:var(--n700);font-size:14px}
  .search input{border:none;outline:none;font:inherit;flex:1;color:var(--n900)}
  .pv-empty{background:#B8B8B8;border-radius:6px;height:360px}

  /* report cover */
  .cover{background:var(--green);color:#fff;border-radius:6px;padding:28px 32px 34px;position:relative;overflow:hidden}
  .cover .cv-top{display:flex;justify-content:space-between;font-size:12px;color:#b9cdc6;margin-bottom:26px}
  .cover h3{font-size:34px;line-height:1.1;font-weight:700;margin:0 0 18px;max-width:640px;text-transform:uppercase}
  .cover .cv-sub{font-size:24px;font-weight:600;margin-bottom:26px}
  .cover .cv-sub i{color:#8fd6ad}
  .cover .cv-pill{display:inline-flex;align-items:center;gap:12px;border:1.5px solid #4f8f74;border-radius:40px;padding:10px 22px;margin-bottom:26px}
  .cover .cv-pill b{font-size:26px;color:#8fd6ad}
  .cover .cv-pill span{font-size:13px;color:#dfeae5;max-width:320px}
  .cover .cv-line{height:2px;background:#4f8f74;margin:0 0 20px}
  .cover .cv-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cover .cv-foot .k{font-size:11px;letter-spacing:.5px;color:#9fbbb1;text-transform:uppercase;margin-bottom:6px}
  .cover .cv-foot .v{font-size:16px;font-weight:600}

  /* ---------- Sub-screen (form) ---------- */
  .subhead{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .subhead .back{width:36px;height:36px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--n900)}
  .subhead .back:hover{background:#ececec}
  .subhead h1{font-size:24px;font-weight:400;margin:0}

  /* workspace: columna lateral (primary/50) PEGADA al contenido + columna derecha opcional */
  .three{display:flex;gap:0;align-items:stretch}
  .sidecol{background:var(--primary50);border-radius:12px 0 0 12px;padding:16px;width:264px;flex:0 0 264px;display:flex;flex-direction:column;transition:flex-basis .15s,width .15s}
  .sidecol.collapsed{width:76px;flex-basis:76px}
  .sidecol .vmenu{flex:1}
  .side-toggle{align-self:flex-end;margin-top:12px;border:none;background:transparent;color:var(--green);cursor:pointer;padding:4px;display:flex}
  .sidecol.collapsed .side-toggle{align-self:center}
  .patient{background:var(--white);border:1px solid var(--n200);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .patient .pa{width:38px;height:38px;border-radius:50%;background:#eef1f0;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .patient b{display:block;font-size:15px}
  .patient span{font-size:12px;color:var(--n700)}
  .vmenu{display:flex;flex-direction:column;gap:4px}
  .vmenu button{display:flex;align-items:center;gap:12px;background:transparent;border:none;text-align:left;padding:11px 14px;border-radius:10px;font-size:15px;color:var(--green);width:100%;cursor:pointer}
  .vmenu button:hover{background:#DCE6E3}
  .vmenu button.active{background:var(--green);color:#fff}
  .vmenu button.active svg{color:#fff}
  .vmenu svg{width:20px;height:20px;color:var(--green);flex-shrink:0}
  .sidecol.collapsed .vmenu button{justify-content:center;padding:11px 0}
  .sidecol.collapsed .vmenu button span{display:none}

  .panel{background:var(--white);border:1px solid var(--n200);border-left:none;border-radius:0 var(--radius) var(--radius) 0;padding:22px 24px;min-height:560px;flex:1;min-width:0}
  .rightcol{flex:0 0 300px;width:300px;margin-left:16px}
  .panel h2{font-size:20px;font-weight:500;margin:0 0 20px}
  .fieldgroup{background:#F8F9FB;border:1px solid var(--n200);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .fieldgroup label.q{display:block;font-size:14px;font-weight:500;margin-bottom:10px}
  .req{color:#c0392b}
  .selectbox{position:relative}
  .selectbox select{width:100%;height:44px;border:1px solid var(--n300);border-radius:8px;padding:0 12px;font:inherit;font-size:14px;background:#fff;appearance:none;color:var(--n900)}
  .selectbox svg{position:absolute;right:12px;top:12px;pointer-events:none;color:var(--n700)}
  .radios{display:flex;gap:28px;align-items:center}
  .radio{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
  .radio input{accent-color:var(--green);width:18px;height:18px}
  .checkrow{display:flex;align-items:center;gap:10px;font-size:14px;background:#fff;border:1px solid var(--n300);border-radius:8px;padding:11px 14px;margin-bottom:8px;cursor:pointer}
  .checkrow input{accent-color:var(--green);width:16px;height:16px}

  .notespanel{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);padding:18px 20px}
  .notespanel h4{font-size:15px;font-weight:500;margin:0 0 12px}
  .notespanel textarea{width:100%;min-height:480px;border:1px solid var(--n200);border-radius:8px;padding:12px;font:inherit;font-size:14px;resize:vertical;outline:none;color:var(--n900)}

  .subfoot{display:flex;justify-content:flex-end;margin-top:18px}

  /* empty section state */
  .empty-sec{background:#F8F9FB;border:1px dashed var(--n300);border-radius:10px;padding:28px;text-align:center;color:var(--n700);font-size:14px}

  /* resumen specifics */
  .valoracion{display:flex;gap:8px;flex-wrap:wrap}
  .val{width:40px;height:40px;border-radius:8px;border:1px solid var(--green);background:#fff;font-size:20px;font-weight:500;color:var(--green);cursor:pointer;transition:transform .05s}
  .val:hover{transform:translateY(-1px)}
  .val.sel{color:#fff;border-color:transparent}
  .val.low.sel{background:#C4362F}
  .val.mid.sel{background:#D98E04}
  .val.high.sel{background:#0E8343}
  .subcard{background:#F8F9FB;border:1px solid var(--n200);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .subcard h4{font-size:15px;font-weight:500;margin:0 0 12px}
  .res-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .res-status{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--n700)}
  .res-status svg{color:#0E8343;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .res-ia{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#0E8343;font-weight:500}
  .res-undo{border:none;background:transparent;color:var(--n700);cursor:pointer;padding:2px;vertical-align:middle}
  .res-undo:hover{color:var(--n900)}
  .resumen-text{background:#fff;border:1px solid var(--n200);border-radius:8px;padding:14px;font-size:14px;line-height:1.55;color:#444;min-height:96px;white-space:pre-line}
  .adjust{margin-top:12px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--n300);border-radius:8px;padding:6px 6px 6px 14px}
  .adjust input{flex:1;border:none;outline:none;font:inherit;font-size:14px;background:transparent}
  .adjust .send{width:34px;height:34px;border-radius:7px;border:none;background:#EEF0F2;color:#AEB4BB;display:flex;align-items:center;justify-content:center;transition:.12s}
  .adjust .send.active{background:var(--green);color:#fff;cursor:pointer}
  /* objetivos: días de la semana */
  .freqrow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .freq{border:1.5px solid var(--green);background:#fff;color:var(--green);border-radius:24px;height:44px;padding:0 22px;font-size:15px;font-weight:500;cursor:pointer}
  .freq.sel{background:var(--green);color:#fff}
  .dayrow{display:flex;gap:12px;flex-wrap:wrap}
  .day{border:1px solid var(--n300);background:#fff;color:var(--n900);border-radius:8px;height:40px;padding:0 18px;font-size:14px;cursor:pointer}
  .day.on{background:#A9BEB6;border-color:#A9BEB6;color:#123}
  /* objetivos: lista de objetivos con radios + subobjetivos */
  .objopt{display:flex;gap:12px;padding:14px 4px}
  .objopt.selbg{background:#EEF3F1;border-radius:12px;padding:16px}
  .objopt .rad{width:20px;height:20px;flex:0 0 20px;border-radius:50%;border:2px solid var(--n300);margin-top:2px;cursor:pointer;position:relative}
  .objopt .rad.on{border-color:var(--green)}
  .objopt .rad.on::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--green)}
  .objopt .otxt b{display:block;font-size:15px;font-weight:500;margin-bottom:4px}
  .objopt .otxt p{margin:0;font-size:13.5px;line-height:1.5;color:var(--n700)}
  .subcardo{background:#fff;border:1px solid var(--n200);border-radius:12px;padding:16px 18px;margin-top:14px}
  .subcardo .sublbl{font-size:11px;letter-spacing:.5px;color:var(--n700);text-transform:uppercase;margin-bottom:8px}
  .collap h4{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .notes-body{font-size:13.5px;line-height:1.6;color:#555;white-space:pre-line;margin-top:6px}
  .metrics{background:#fff;border:1px solid var(--n200);border-radius:var(--radius);overflow:hidden}
  .metrics .row{display:flex;justify-content:space-between;padding:11px 16px;font-size:14px;border-top:1px solid #F0F0F0}
  .metrics .row:first-child{border-top:none}
  .metrics .row .k{color:var(--n900)}
  .metrics .row .v{color:var(--n900);font-weight:500}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(120,140,135,.55);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:520px;max-width:92vw;padding:24px 26px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .modal .mh{display:flex;justify-content:space-between;align-items:flex-start}
  .modal h3{font-size:20px;font-weight:600;margin:0}
  .modal .x{border:none;background:transparent;color:var(--n700);width:28px;height:28px}
  .modal p{color:var(--n700);font-size:14px;margin:8px 0 20px;line-height:1.5}
  .modal .lbl{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;margin-bottom:12px}
  .opt{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:15px;cursor:pointer}
  .opt input{accent-color:var(--green);width:18px;height:18px}
  .modal .mfoot{display:flex;justify-content:flex-end;gap:12px;margin-top:22px}
  /* vista previa del informe */
  .preview-modal{background:#fff;border-radius:14px;width:760px;max-width:94vw;max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .pm-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 24px;border-bottom:1px solid var(--n200);position:sticky;top:0;background:#fff}
  .pm-head b{display:block;font-size:17px;font-weight:600}
  .pm-head span{font-size:13px;color:var(--n700)}
  .pm-head .x{border:none;background:transparent;color:var(--n700);width:28px;height:28px;cursor:pointer}
  .pm-body{padding:24px}

  /* ---------- Prototype launcher ---------- */
  .menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px;background:var(--bg)}
  .menu .logo{font-size:46px}
  .menu p{color:var(--n700);margin:0}
  .menu .flows{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;max-width:820px}
  .flowbtn{background:var(--white);border:1px solid var(--n200);border-radius:16px;padding:26px 24px;width:240px;text-align:left;box-shadow:var(--shadow);transition:transform .1s}
  .flowbtn:hover{transform:translateY(-3px);border-color:var(--green)}
  .flowbtn .fi{width:42px;height:42px;border-radius:10px;background:var(--success-50);color:var(--green);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .flowbtn b{display:block;font-size:18px;margin-bottom:6px}
  .flowbtn span{font-size:13px;color:var(--n700);line-height:1.4}

  /* ---------- Histórico list (Cliente - Análisis) ---------- */
  .listcard{padding:0;overflow:hidden}
  .list-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px}
  .list-head h2{font-size:18px;font-weight:500;margin:0}
  .tbl{width:100%;border-collapse:collapse}
  .tbl thead th{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;font-weight:500;text-align:left;padding:8px 24px}
  .tbl tbody tr{border-top:1px solid var(--n200);cursor:pointer}
  .tbl tbody tr:hover{background:#fafbfc}
  .tbl td{padding:16px 24px;font-size:14px;color:var(--n900);vertical-align:middle}
  .tbl td.date{color:var(--n900)}
  .tbl .pdf{color:var(--green);text-decoration:underline}
  .tbl td.chev{text-align:right;color:var(--n700);width:56px}
  .tbl td.chev svg{width:18px;height:18px}

  /* prototype home fab */
  .fab{position:fixed;left:16px;bottom:16px;z-index:60;background:var(--green);color:#fff;border:none;border-radius:24px;height:40px;padding:0 16px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .fab.show{display:inline-flex}

  .hidden{display:none !important}
</style>

<!-- ============ APP ============ -->

/* ---------- Landing render (screens 1,2,3,4,6,7) ---------- */
function renderLanding(){
  const s=state;
  const allDone = s.done.analisis && s.done.resumen && s.done.objetivos;
  const gen = s.generated;
  // Descargar y Generar se habilitan al completar los 3 pasos. Actualizar se deshabilita tras generar.
  const ready = allDone;
  const actualizarOn = allDone && !gen;
  const resultDone = allDone || gen;
  const showCover = allDone || gen;
  const dateCreate=fmtDate(s.tCreacion);
  const dateUpd = fmtDate(s.tActualizacion);
  const dateGen = fmtDate(s.tGeneracion);
  let metodoCell='-';
  if(gen){
    const label = s.metodo==='ambos' ? 'Correo electrónico y postal' : 'Correo electrónico';
    metodoCell = `<span class="chip">${I.mail} ${label}</span>`;
  }
  // cards: tag "Completado" (success/50) siempre que la sección esté hecha (incluido tras generar)
  const badge = (k)=> s.done[k] ? '<span class="badge">Completado</span>' : '';

  const preview = showCover ? coverHTML() : '<div class="pv-empty"></div>';

  el('view').innerHTML = `
  <div class="page">
    <div class="crumbs">
      <span>Clientes</span> ${I.chev}
      <span>Pablo Fernández</span> ${I.chev}
      <a href="#" onclick="goList();return false" style="color:inherit;text-decoration:none">Histórico de análisis</a> ${I.chev}
      <span class="cur">${s.title}</span>
    </div>
    <div class="pagehead">
      <h1>${s.title}</h1>
      <div class="actions">
        <button class="btn" ${actualizarOn?'':'disabled'}>${I.refresh} Actualizar informe</button>
        <button class="btn" ${ready?'':'disabled'}>${I.download} Descargar PDF</button>
        <button class="btn primary" ${ready?'':'disabled'} onclick="${ready?'openModal()':''}">${I.file} Generar informe</button>
      </div>
    </div>

    <div class="landing">
      <div class="side">
        <button class="navcard" onclick="${s.type==='seguimiento'?'openSeguimiento()':'openAnalisis()'}">
          <div class="top"><span class="ci">${I.chart}</span>${badge('analisis')}</div>
          <h3>${s.type==='seguimiento'?'Análisis de seguimiento':'Análisis inicial'}</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
        <button class="navcard" onclick="openResumen()">
          <div class="top"><span class="ci">${I.doc}</span>${badge('resumen')}</div>
          <h3>Resumen Ejecutivo</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
        <button class="navcard" onclick="openObjetivos()">
          <div class="top"><span class="ci">${I.target}</span>${badge('objetivos')}</div>
          <h3>Objetivos</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
      </div>

      <div class="main">
        <div class="card resultcard">
          <div class="rc-head">
            <h2>Resultado</h2>
            <span class="status ${resultDone?'done':'pending'}">${resultDone?'Completado':'Pendiente'}</span>
          </div>
          <div class="meta">
            <div><div class="k">Fecha de creación</div><div class="v">${dateCreate}</div></div>
            <div><div class="k">Última actualización</div><div class="v">${dateUpd}</div></div>
            <div><div class="k">Fecha de generación</div><div class="v">${dateGen}</div></div>
            <div><div class="k">Método de envío</div><div class="v">${metodoCell}</div></div>
          </div>
        </div>

        <div class="card previewcard">
          <div class="pv-head">
            <h2>Vista previa del Informe</h2>
            <div class="search">${I.search}<input placeholder="Buscar" /></div>
          </div>
          ${preview}
        </div>
      </div>
    </div>
  </div>`;
}

/* ---------- Helpers compartidos ---------- */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let sideCollapsed=false;
// Columna lateral (fondo primary/50, pegada al contenido). toggle = colapsar/expandir (resumen/objetivos)
function sidecolHTML(items, active, iconMap, fn, opts){
  opts=opts||{};
  const coll = opts.toggle && sideCollapsed;
  const patient = opts.patient && !coll
    ? `<div class="patient"><div class="pa">PF</div><div><b>Pablo Fernández</b><span>Póliza #VRMC018619GB19</span></div></div>` : '';
  const menu = items.map(m=>`<button class="${m===active?'active':''}" onclick="${fn}('${m.replace(/'/g,"\\'")}')">${I[iconMap[m]]}<span>${m}</span></button>`).join('');
  const toggle = opts.toggle
    ? `<button class="side-toggle" onclick="sideCollapsed=!sideCollapsed;${fn}('${active.replace(/'/g,"\\'")}')" title="Colapsar / expandir">${I.collapse}</button>` : '';
  return `<aside class="sidecol ${coll?'collapsed':''}">${patient}<div class="vmenu">${menu}</div>${toggle}</aside>`;
}

          <div class="res-head"><h4 style="margin:0">Resumen Ejecutivo</h4><span id="resHeadRight"></span></div>
          <div class="resumen-text" id="resumenText">${DATA.resumenText}</div>
          <div class="adjust"><input id="adjustInput" placeholder="Ajustar resumen..." oninput="onAdjustInput()"><button class="send" id="sendBtn" onclick="sendAdjust()">${I.sendup}</button></div>
        </div>
        ${notesCollap()}
      </div>
      ${rightKpi()}
    </div>
    <div class="subfoot">
      <button class="btn primary" onclick="saveResumen()">Guardar</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function setRating(n){
  resumenUI.rating=n;
  document.querySelectorAll('.valoracion .val').forEach((b,i)=>{ b.classList.toggle('sel', i===n); });
}
// status 2: al teclear en "Ajustar resumen" se activa el botón de enviar
function onAdjustInput(){
  const inp=el('adjustInput'); const btn=el('sendBtn');
  const has=inp.value.trim().length>0;
  btn.classList.toggle('active', has);
  resumenUI.status = has?2:1;
}
// status 3 (procesando) -> status 4 (editado con IA)
function sendAdjust(){
  const inp=el('adjustInput'); if(!inp.value.trim()) return;
  inp.value=''; inp.disabled=true;
  el('sendBtn').classList.remove('active');
  resumenUI.status=3;
  el('resumenText').textContent='';
  el('resHeadRight').innerHTML=`<span class="res-status">${I.sparkle} Adaptando el resumen...</span>`;
  setTimeout(()=>{
    resumenUI.status=4; resumenUI.text=DATA.resumenTextIA;
    el('resumenText').textContent=DATA.resumenTextIA;
    el('resHeadRight').innerHTML=`<span class="res-ia">${I.sparkle} Editado con IA</span> <button class="res-undo" onclick="undoResumen()" title="Deshacer">${I.undo}</button>`;
    el('adjustInput').disabled=false;
  }, 2600);
}
function undoResumen(){
  resumenUI.status=1; resumenUI.text=DATA.resumenText;
  el('resumenText').textContent=DATA.resumenText;
  el('resHeadRight').innerHTML='';
  const inp=el('adjustInput'); inp.value=''; inp.disabled=false;
  el('sendBtn').classList.remove('active');
}
function saveResumen(){ state.done.resumen=true; state.tActualizacion=new Date(); renderLanding(); }

/* ---------- Objetivos (Días de la semana + Objetivos/Subobjetivos) ---------- */
const OBJ_MENU=['Nutricional','Cognitivo','Físico'];
const OBJ_ICON={Nutricional:'m_nutr',Cognitivo:'m_cogn',Físico:'m_func'};
const DIAS=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const FREQS=[['todos','Todos los días'],['lv','Lunes a viernes'],['finde','Fin de semana'],['alternos','Días alternos']];
function daysOn(freq){
  if(freq==='todos') return [1,1,1,1,1,1,1];
  if(freq==='lv') return [1,1,1,1,1,0,0];
  if(freq==='finde') return [0,0,0,0,0,1,1];
  return [1,0,1,0,1,0,1]; // alternos
}
const OBJ_DATA={
  Nutricional:[
    {t:'Mantener una alimentación saludable', d:'Mantener una alimentación equilibrada como hasta ahora'},
    {t:'Alcanzar una alimentación saludable', d:'Alcanzar una alimentación equilibrada.'},
  ],
  Cognitivo:[
    {t:'Entrenamiento de las facultades cognitivas', d:'Potenciar y mantener las capacidades cognitivas mediante actividades y dinámicas adaptadas a su nivel funcional, favoreciendo la estimulación mental, la autonomía y el mantenimiento de las funciones cognitivas en el día a día.', subs:[
      {t:'Estimulación cognitiva básica', d:'Ayuda a mantener la mente activa y ágil, favorece la concentración y contribuye a preservar la autonomía y la confianza en el día a día. Favorecer el mantenimiento de funciones cognitivas básicas como orientación, atención, reconocimiento y memoria inmediata mediante actividades sencillas y funcionales, promoviendo la participación activa y el bienestar cognitivo en las actividades cotidianas.'},
      {t:'Entrenamiento cognitivo avanzado', d:'Ayuda a mantener la mente activa y ágil, favorece la concentración y contribuye a preservar la autonomía y la confianza en el día a día. Maximizar el rendimiento de funciones cognitivas complejas como memoria operativa, atención sostenida, razonamiento, planificación y lenguaje mediante ejercicios estructurados y actividades de estimulación cognitiva de complejidad media-alta, adaptadas al perfil y evolución de la persona.'},
    ]},
  ],
  Físico:[
    {t:'Mejora de la capacidad aeróbica', d:'Programa diseñado para fortalecer la salud cardiovascular y aumentar la vitalidad mediante caminatas adaptadas que mejoran la resistencia de forma progresiva, integrando el movimiento como una base sólida y natural de la rutina diaria para mejorar la movilidad y la autonomía.', subs:[
      {t:'Natación o actividad acuática', d:'Permite el movimiento con menor carga de peso corporal, reduce el impacto en las articulaciones y mejora la resistencia aeróbica de forma segura. Ejercicios realizados en el medio acuático para aprovechar la flotación y la resistencia del agua, incluyendo caminatas asistidas, equilibrio y natación suave adaptada.'},
      {t:'Cicilismo o bicicleta estática', d:'Mejora la salud cardiovascular, fortalece la musculatura de las piernas y protege las articulaciones de rodilla y cadera al evitar impactos. Uso de la bicicleta para trabajar el movimiento circular de las piernas sin impacto articular fuerte, desde la toma de contacto suave hasta retos de resistencia e intensidad.'},
      {t:'Más energía', d:'Incremento notable de la resistencia física, mejora del estado de ánimo y mayor protección de las articulaciones. Progresión hacia caminatas de mayor duración. Se introduce la gestión del ritmo ante el cansancio, permitiendo al cuerpo adaptarse a esfuerzos más prolongados de forma segura.'},
      {t:'Primeros pasos', d:'Reducción del sedentarismo, activación de la circulación inicial y mejora de la movilidad articular básica. Nivel pensado para personas que actualmente se mueven muy poco o están empezando a recuperar el hábito de caminar. El objetivo es introducir pequeñas caminatas diarias para ganar confianza sin generar fatiga.'},
      {t:'Movimiento Vital', d:'Conservación de la autonomía funcional, salud cardiovascular óptima y mantenimiento de la masa muscular. Nivel orientado a mantener un estilo de vida activo y saludable a largo plazo con caminatas de mayor duración. El movimiento se convierte en una parte estable y natural de la rutina diaria.'},
      {t:'Ritmo constante', d:'Mejora de la eficiencia cardiaca, mayor oxigenación del cuerpo y fortalecimiento de la estabilidad al caminar. Enfocado en consolidar el hábito mediante caminatas de duración intermedia. Se busca mantener un ritmo continuo y fluido, prestando atención a la postura y la respiración.'},
    ]},
    {t:'Mantenimiento del nivel de actividad física', d:'Enfoque transversal centrado en realizar actividad física regular (caminar, ejercicio aeróbico, fuerza y flexibilidad) adaptada a la condición física actual y mantenida de forma constante, proporcionando las herramientas de motivación y organización necesarias para consolidar el ejercicio como un pilar de bienestar sostenible y duradero.'},
    {t:'Mejora de la fuerza muscular y resistencia física', d:'Programa centrado en ejercicios de fortalecimiento que potencien la musculatura y mejoren la resistencia física, brindando el soporte necesario para realizar las tareas diarias con menor esfuerzo, favoreciendo así la autonomía personal.'},
    {t:'Mejora de la flexibilidad y movilidad articular', d:'Enfocado en favorecer la amplitud de movimiento mediante ejercicios de estiramiento y movilidad articular, contribuyendo a la reducción de la rigidez, la prevención de lesiones y la mejora del bienestar físico y postural en el día a día.'},

};
let objState={ freq:{Nutricional:'lv',Cognitivo:'lv',Físico:'lv'}, obj:{Nutricional:0,Cognitivo:0,Físico:0}, sub:{Nutricional:0,Cognitivo:0,Físico:0} };
function objContent(sec){
  const freq=objState.freq[sec], on=daysOn(freq);
  const dias=`<div class="subcard">
      <h4>Días de la semana</h4>
      <div class="freqrow">${FREQS.map(f=>`<button class="freq ${f[0]===freq?'sel':''}" onclick="setObjFreq('${sec}','${f[0]}')">${f[1]}</button>`).join('')}</div>
      <div class="dayrow">${DIAS.map((d,i)=>`<span class="day ${on[i]?'on':''}">${d}</span>`).join('')}</div>
    </div>`;
  const list=OBJ_DATA[sec], selIdx=objState.obj[sec];
  const objetivos=`<div class="subcard">
      <h4>Objetivos</h4>
      ${list.map((o,i)=>{
        const sel=i===selIdx;
        let subs='';
        if(sel && o.subs){
          const ss=objState.sub[sec];
          subs=`<div class="subcardo"><div class="sublbl">Subobjetivos</div>
            ${o.subs.map((s,j)=>`<div class="objopt"><span class="rad ${j===ss?'on':''}" onclick="setObjSub('${sec}',${j})"></span><div class="otxt"><b>${s.t}</b><p>${s.d}</p></div></div>`).join('')}
          </div>`;
        }
        return `<div class="objopt ${sel?'selbg':''}"><span class="rad ${sel?'on':''}" onclick="setObj('${sec}',${i})"></span><div class="otxt"><b>${o.t}</b><p>${o.d}</p>${subs}</div></div>`;
      }).join('')}
    </div>`;
  return `<h2>${sec}</h2>${dias}${objetivos}`;
}
function openObjetivos(active){
  active=active||'Nutricional'; useHeaderPortal();
  el('view').innerHTML=`
  <div class="page">
    <div class="subhead">
      <button class="back" onclick="renderLanding()">${I.back}</button>
      <h1>Objetivos</h1>
    </div>
    <div class="three">
      ${sidecolHTML(OBJ_MENU,active,OBJ_ICON,'openObjetivos',{toggle:true})}
      <div class="panel">${objContent(active)}</div>
    </div>
    <div class="subfoot">
      <button class="btn primary" onclick="saveObjetivos()">Guardar</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
// mantener la sección activa al re-renderizar
function currentObjSec(){ const a=document.querySelector('.sidecol .vmenu button.active span'); return a?a.textContent:'Nutricional'; }
function setObjFreq(sec,f){ objState.freq[sec]=f; openObjetivos(sec); }
function setObj(sec,i){ objState.obj[sec]=i; openObjetivos(sec); }
function setObjSub(sec,j){ objState.sub[sec]=j; openObjetivos(sec); }
function saveObjetivos(){ state.done.objetivos=true; state.tActualizacion=new Date(); renderLanding(); }

/* ---------- Screen 5 : modal Generar informe ---------- */
function openModal(){
  const ov=document.createElement('div');
  ov.className='overlay open'; ov.id='overlay';
  ov.innerHTML=`
    <div class="modal">
      <div class="mh"><h3>Generar informe</h3><button class="x" onclick="closeModal()">${I.x}</button></div>
      <p>El informe queda registrado una vez generado. Es necesario indicar el método de envío del informe.</p>
      <div class="lbl">Método de envío</div>
      <label class="opt"><input type="radio" name="metodo" value="email"> Enviar por correo electrónico</label>
      <label class="opt"><input type="radio" name="metodo" value="ambos"> Enviar por correo electrónico y correo postal</label>
      <div class="mfoot">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn primary" onclick="sendReport()">${I.send} Enviar informe</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}
function closeModal(){ const o=el('overlay'); if(o) o.remove(); }

/* ---------- Vista previa del informe (columna INFORME del histórico) ---------- */
function previewInforme(i){
  const r=LIST_ROWS[i];
  const ov=document.createElement('div');
  ov.className='overlay open'; ov.id='overlay';
  ov.onclick=(e)=>{ if(e.target===ov) closeModal(); };
  ov.innerHTML=`
    <div class="preview-modal">
      <div class="pm-head">
        <div><b>${r.informe}</b><span>${r.fecha} · ${r.metodo}</span></div>
        <button class="x" onclick="closeModal()">${I.x}</button>
      </div>
      <div class="pm-body">${coverHTML()}</div>
    </div>`;
  document.body.appendChild(ov);
}
function sendReport(){
  const sel=document.querySelector('input[name="metodo"]:checked');
  state.metodo = sel ? sel.value : 'email';
  state.generated=true;
  const now=new Date(); state.tGeneracion=now; state.tActualizacion=now;
  closeModal();
  renderLanding();
}

/* boot */
renderList();
