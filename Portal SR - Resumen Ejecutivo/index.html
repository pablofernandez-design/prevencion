<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portal SR · Cliente - Análisis</title>
<style>
  :root{
    --green:#004039;
    --green-dark:#002b26;
    --green-card:#013a33;
    --brown:#6B3A27;
    --bg:#F6F7F9;
    --white:#fff;
    --n200:#E5E5E5;
    --n300:#D8DAE0;
    --n700:#666;
    --n900:#333;
    --success-50:#E8F8EF;
    --success-100:#B6E9CD;
    --success-700:#1c7a54;
    --pending-bg:#FBEFC9;
    --pending-fg:#8A6B18;
    --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Aeonik",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--n900);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  .serif{font-family:Georgia,"Times New Roman",serif}

  /* ---------- App shell ---------- */
  .app{max-width:1440px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

  /* ---------- Top header ---------- */
  .topbar{
    height:64px;background:var(--white);border-bottom:1px solid var(--n200);
    display:flex;align-items:center;justify-content:space-between;padding:0 40px;
  }
  .logo{font-size:30px;color:var(--green);letter-spacing:.5px}
  .nav{display:flex;align-items:center;gap:28px;font-size:15px;color:var(--green)}
  .nav a{color:var(--green);text-decoration:none;font-weight:500}
  .nav a.active{font-weight:700}
  .nav .sep{width:1px;height:26px;background:var(--n200)}
  .user{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .user .who{font-size:13px;line-height:1.2}
  .user .who b{display:block;font-weight:600;color:var(--n900)}
  .user .who span{color:var(--n700);font-size:12px}
  .icon{width:20px;height:20px;display:inline-block;vertical-align:middle}

  /* ---------- Page ---------- */
  .page{padding:20px 24px 48px}
  .crumbs{display:flex;align-items:center;gap:8px;color:var(--n700);font-size:13px;margin-bottom:10px;flex-wrap:wrap}
  .crumbs .cur{color:var(--n900);font-weight:600}
  .crumbs svg{opacity:.5}

  .pagehead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
  .pagehead h1{font-size:26px;font-weight:400;margin:0;color:var(--n900)}
  .actions{display:flex;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 16px;border-radius:8px;font-size:14px;font-weight:500;border:1px solid var(--n300);background:var(--white);color:var(--n900);white-space:nowrap}
  .btn:hover{background:#fafafa}
  .btn.primary{background:var(--green);border-color:var(--green);color:#fff}
  .btn.primary:hover{background:#013128}
  .btn[disabled]{background:#EEF0F2;border-color:#EEF0F2;color:#AEB4BB;cursor:not-allowed}
  .btn.primary[disabled]{background:#EEF0F2;border-color:#EEF0F2;color:#AEB4BB}

  /* ---------- Landing layout ---------- */
  .landing{display:grid;grid-template-columns:224px 1fr;gap:16px;align-items:start}
  .side{display:flex;flex-direction:column;gap:14px}
  .navcard{
    background:var(--green-card);color:#fff;border-radius:var(--radius);padding:16px 16px 14px;
    min-height:112px;display:flex;flex-direction:column;justify-content:space-between;
    text-align:left;border:none;width:100%;position:relative;transition:transform .08s;
  }
  .navcard:hover{transform:translateY(-1px)}
  .navcard.first{background:var(--green-dark)}
  .navcard .top{display:flex;align-items:flex-start;justify-content:space-between}
  .navcard .ci{width:24px;height:24px;opacity:.95}
  .navcard .badge{background:#F1EEE4;color:#3d3d3d;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .navcard h3{margin:14px 0 0;font-size:20px;font-weight:500}
  .navcard .arrow{align-self:flex-start;margin-top:8px;opacity:.9}

  .main{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);box-shadow:var(--shadow)}
  .resultcard{padding:20px 24px}
  .resultcard .rc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .resultcard h2{font-size:18px;font-weight:500;margin:0}
  .status{font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px}
  .status.pending{background:var(--pending-bg);color:var(--pending-fg)}
  .status.done{background:var(--success-50);color:var(--success-700)}
  .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .meta .k{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;margin-bottom:6px}
  .meta .v{font-size:15px;font-weight:600;color:var(--n900)}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--success-50);color:var(--success-700);font-size:13px;font-weight:500;padding:5px 10px;border-radius:8px}

  .previewcard{padding:20px 24px 24px}
  .pv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px}
  .pv-head h2{font-size:16px;font-weight:500;margin:0}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--n300);border-radius:8px;height:40px;padding:0 12px;width:280px;color:var(--n700);font-size:14px}
  .search input{border:none;outline:none;font:inherit;flex:1;color:var(--n900)}
  .pv-empty{background:#B8B8B8;border-radius:6px;height:360px}

  /* report cover */
  .cover{background:var(--green);color:#fff;border-radius:6px;padding:28px 32px 34px;position:relative;overflow:hidden}
  .cover .cv-top{display:flex;justify-content:space-between;font-size:12px;color:#b9cdc6;margin-bottom:26px}
  .cover h3{font-size:34px;line-height:1.1;font-weight:700;margin:0 0 18px;max-width:640px;text-transform:uppercase}
  .cover .cv-sub{font-size:24px;font-weight:600;margin-bottom:26px}
  .cover .cv-sub i{color:#8fd6ad}
  .cover .cv-pill{display:inline-flex;align-items:center;gap:12px;border:1.5px solid #4f8f74;border-radius:40px;padding:10px 22px;margin-bottom:26px}
  .cover .cv-pill b{font-size:26px;color:#8fd6ad}
  .cover .cv-pill span{font-size:13px;color:#dfeae5;max-width:320px}
  .cover .cv-line{height:2px;background:#4f8f74;margin:0 0 20px}
  .cover .cv-foot{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cover .cv-foot .k{font-size:11px;letter-spacing:.5px;color:#9fbbb1;text-transform:uppercase;margin-bottom:6px}
  .cover .cv-foot .v{font-size:16px;font-weight:600}

  /* ---------- Sub-screen (form) ---------- */
  .subhead{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .subhead .back{width:36px;height:36px;border-radius:8px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--n900)}
  .subhead .back:hover{background:#ececec}
  .subhead h1{font-size:24px;font-weight:400;margin:0}

  .three{display:grid;grid-template-columns:262px 1fr 300px;gap:16px;align-items:start}
  .patient{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .patient .pa{width:38px;height:38px;border-radius:50%;background:#eef1f0;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .patient b{display:block;font-size:15px}
  .patient span{font-size:12px;color:var(--n700)}
  .vmenu{display:flex;flex-direction:column;gap:2px}
  .vmenu button{display:flex;align-items:center;gap:12px;background:transparent;border:none;text-align:left;padding:12px 14px;border-radius:8px;font-size:15px;color:var(--n900)}
  .vmenu button:hover{background:#eef1f0}
  .vmenu button.active{background:var(--green);color:#fff}
  .vmenu button.active svg{color:#fff}
  .vmenu svg{width:18px;height:18px;color:var(--n700);flex-shrink:0}

  .panel{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);padding:22px 24px;min-height:560px}
  .panel h2{font-size:20px;font-weight:500;margin:0 0 20px}
  .fieldgroup{background:#F8F9FB;border:1px solid var(--n200);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .fieldgroup label.q{display:block;font-size:14px;font-weight:500;margin-bottom:10px}
  .req{color:#c0392b}
  .selectbox{position:relative}
  .selectbox select{width:100%;height:44px;border:1px solid var(--n300);border-radius:8px;padding:0 12px;font:inherit;font-size:14px;background:#fff;appearance:none;color:var(--n900)}
  .selectbox svg{position:absolute;right:12px;top:12px;pointer-events:none;color:var(--n700)}
  .radios{display:flex;gap:28px;align-items:center}
  .radio{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
  .radio input{accent-color:var(--green);width:18px;height:18px}

  .notespanel{background:var(--white);border:1px solid var(--n200);border-radius:var(--radius);padding:18px 20px}
  .notespanel h4{font-size:15px;font-weight:500;margin:0 0 12px}
  .notespanel textarea{width:100%;min-height:480px;border:1px solid var(--n200);border-radius:8px;padding:12px;font:inherit;font-size:14px;resize:vertical;outline:none;color:var(--n900)}

  .subfoot{display:flex;justify-content:flex-end;margin-top:18px}

  /* resumen specifics */
  .valoracion{display:flex;gap:8px;flex-wrap:wrap}
  .val{width:40px;height:40px;border-radius:8px;border:1px solid var(--n300);background:#fff;font-size:15px;font-weight:600;color:var(--n900)}
  .val.sel{background:var(--green);border-color:var(--green);color:#fff}
  .subcard{background:#F8F9FB;border:1px solid var(--n200);border-radius:10px;padding:16px 18px;margin-bottom:16px}
  .subcard h4{font-size:15px;font-weight:500;margin:0 0 12px}
  .resumen-text{background:#fff;border:1px solid var(--n200);border-radius:8px;padding:14px;font-size:14px;line-height:1.55;color:#444}
  .adjust{margin-top:12px;display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--n300);border-radius:8px;padding:6px 6px 6px 14px}
  .adjust input{flex:1;border:none;outline:none;font:inherit;font-size:14px}
  .adjust .send{width:34px;height:34px;border-radius:7px;border:none;background:#EEF0F2;color:#AEB4BB;display:flex;align-items:center;justify-content:center}
  .collap h4{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .notes-body{font-size:13.5px;line-height:1.6;color:#555;white-space:pre-line;margin-top:6px}
  .metrics{background:#fff;border:1px solid var(--n200);border-radius:var(--radius);overflow:hidden}
  .metrics .row{display:flex;justify-content:space-between;padding:11px 16px;font-size:14px;border-top:1px solid #F0F0F0}
  .metrics .row:first-child{border-top:none}
  .metrics .row .k{color:var(--n900)}
  .metrics .row .v{color:var(--n900);font-weight:500}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(120,140,135,.55);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:520px;max-width:92vw;padding:24px 26px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
  .modal .mh{display:flex;justify-content:space-between;align-items:flex-start}
  .modal h3{font-size:20px;font-weight:600;margin:0}
  .modal .x{border:none;background:transparent;color:var(--n700);width:28px;height:28px}
  .modal p{color:var(--n700);font-size:14px;margin:8px 0 20px;line-height:1.5}
  .modal .lbl{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;margin-bottom:12px}
  .opt{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:15px;cursor:pointer}
  .opt input{accent-color:var(--green);width:18px;height:18px}
  .modal .mfoot{display:flex;justify-content:flex-end;gap:12px;margin-top:22px}

  /* ---------- Prototype launcher ---------- */
  .menu{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px;background:var(--bg)}
  .menu .logo{font-size:46px}
  .menu p{color:var(--n700);margin:0}
  .menu .flows{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;max-width:820px}
  .flowbtn{background:var(--white);border:1px solid var(--n200);border-radius:16px;padding:26px 24px;width:240px;text-align:left;box-shadow:var(--shadow);transition:transform .1s}
  .flowbtn:hover{transform:translateY(-3px);border-color:var(--green)}
  .flowbtn .fi{width:42px;height:42px;border-radius:10px;background:var(--success-50);color:var(--green);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .flowbtn b{display:block;font-size:18px;margin-bottom:6px}
  .flowbtn span{font-size:13px;color:var(--n700);line-height:1.4}

  /* ---------- Histórico list (Cliente - Análisis) ---------- */
  .listcard{padding:0;overflow:hidden}
  .list-head{display:flex;align-items:center;justify-content:space-between;padding:18px 24px}
  .list-head h2{font-size:18px;font-weight:500;margin:0}
  .tbl{width:100%;border-collapse:collapse}
  .tbl thead th{font-size:11px;letter-spacing:.4px;color:var(--n700);text-transform:uppercase;font-weight:500;text-align:left;padding:8px 24px;border-top:1px solid var(--n200)}
  .tbl tbody tr{border-top:1px solid var(--n200);cursor:pointer}
  .tbl tbody tr:hover{background:#fafbfc}
  .tbl td{padding:16px 24px;font-size:14px;color:var(--n900);vertical-align:middle}
  .tbl td.date{color:var(--n900)}
  .tbl .pdf{color:var(--green);text-decoration:underline}
  .tbl td.chev{text-align:right;color:var(--n700);width:56px}
  .tbl td.chev svg{width:18px;height:18px}

  /* prototype home fab */
  .fab{position:fixed;left:16px;bottom:16px;z-index:60;background:var(--green);color:#fff;border:none;border-radius:24px;height:40px;padding:0 16px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .fab.show{display:inline-flex}

  .hidden{display:none !important}
</style>

<!-- ============ APP ============ -->
<div id="app" class="app">
  <header class="topbar">
    <div class="logo serif">Qida</div>
    <nav class="nav">
      <a href="#" class="active">Clientes</a>
      <a href="#">Agenda</a>
      <a href="#">Equipos</a>
      <a href="#">Lucid</a>
      %ICON_CHATNAV%
      <div class="sep"></div>
      <div class="user">
        <div class="avatar">P</div>
        <div class="who"><b>Pablo Fernandez Alvarez</b><span>Coordinador/a</span></div>
        %ICON_CHEVDOWN%
      </div>
    </nav>
  </header>
  <div id="view"></div>
</div>

<button class="fab" id="fab" onclick="goList()">%ICON_HOME% Histórico</button>

  m_act:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8v8M18 8v8M4 12h4M16 12h4M9 12h6"/></svg>',
  m_aud:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8a6 6 0 0 1 12 0c0 4-3 5-3 8a3 3 0 0 1-6 0"/></svg>',
  m_tab:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="10" width="18" height="5" rx="1"/><path d="M17 10V8M20 10V8"/></svg>',
};
document.body.innerHTML = document.body.innerHTML
  .replaceAll('%ICON_PLUS%',I.plus).replaceAll('%ICON_CHART%',I.chart)
  .replaceAll('%ICON_REFRESH%',I.refresh).replaceAll('%ICON_CHATNAV%',I.chatnav)
  .replaceAll('%ICON_CHEVDOWN%',I.chevdown).replaceAll('%ICON_HOME%',I.home);

/* ---------- State ---------- */
let state = {};
function fresh(){ return {title:'Informe inicial', done:{analisis:false,resumen:false,objetivos:false}, generated:false, metodo:null}; }

const DATA = {
  resumenText:'¡Enhorabuena! Sigues una dieta mediterránea con buenos hábitos nutricionales. Tu consumo de pescado, frutos secos, legumbres y verduras es adecuado, y mantienes una ingesta moderada de carnes rojas y productos ultraprocesados. Tu índice de masa corporal (IMC) es de 23.4, que se encuentra dentro del rango normal y saludable. Continúa manteniendo estos excelentes hábitos alimentarios que contribuyen positivamente a tu bienestar general. ¡Sigue así!',
  notas:'Mujer, 78 años. No antecedentes familiares de deterioro/demencia.\nSin enfermedades crónicas ni medicación relevante, dice encontrarse bien de salud.\nTotalmente autónoma, se maneja sola en el día a día, no necesita ayuda para nada.\nNo refiere fallos de memoria ni problemas para seguir la conversación; ánimo bueno y duerme bien.\nPesa 60 kg, mide 1,60.\nCome variado, dieta mediterránea, bastante pescado y verdura.\nEstudios medios, ahora no trabaja.\nLee a diario y sale, vida social activa.\nEn general muy buen estado.',
  metrics:[['IPAQ','2754'],['IMC','23,44'],['MEDAS','5/13'],['MEC de Lobo','-'],['Dibujo del Reloj','-'],['Goldberg - Ansiedad','0'],['Goldberg - Depresión','0'],['Fagerström','-'],['Richmont','-'],['AUDIT-C','0'],['Barthel','-'],['Lawton y Brody','-'],['Demencia','-13'],['ANU-ADRI','-3'],['VIG-Express','0'],['Pfeiffer','-']],
};

/* ---------- Navigation ---------- */
const el = (id)=>document.getElementById(id);
function goList(){ el('fab').classList.remove('show'); renderList(); }
function startNuevo(){ state=fresh(); el('fab').classList.add('show'); renderLanding(); }
function startInicial(){ state={title:'Informe inicial', done:{analisis:true,resumen:true,objetivos:true}, generated:true, metodo:'ambos'}; el('fab').classList.add('show'); renderLanding(); }
function startSeguimiento(){ state={title:'Informe de seguimiento', done:{analisis:true,resumen:true,objetivos:true}, generated:true, metodo:'ambos'}; el('fab').classList.add('show'); renderLanding(); }

/* ---------- Histórico de análisis list (Cliente - Análisis) ---------- */
const LIST_ROWS=[
  {fecha:'14/07/2026', informe:'Informe de seguimiento 2 - 2026', metodo:'Correo electrónico y postal', open:'startSeguimiento()'},
  {fecha:'14/07/2025', informe:'Informe de seguimiento 1 - 2026', metodo:'Correo electrónico y postal', open:'startSeguimiento()'},
  {fecha:'14/07/2024', informe:'Informe inicial', metodo:'Correo electrónico y postal', open:'startInicial()'},
];
function renderList(){
  el('view').innerHTML=`
  <div class="page">
    <div class="crumbs">
      <span>Clientes</span> ${I.chev}
      <span>Pablo Fernández</span> ${I.chev}
      <span class="cur">Histórico de análisis</span>
    </div>
    <div class="pagehead"><h1>Histórico de análisis</h1></div>
    <div class="card listcard">
      <div class="list-head">
        <h2>Histórico de análisis</h2>
        <button class="btn primary" onclick="startNuevo()">${I.plus} Nuevo informe</button>
      </div>
      <table class="tbl">
        <thead><tr><th>Fecha</th><th>Informe</th><th>Método de envío</th><th>Informe</th><th></th></tr></thead>
        <tbody>
          ${LIST_ROWS.map(r=>`
          <tr onclick="${r.open}">
            <td class="date">${r.fecha}</td>
            <td>${r.informe}</td>
            <td>${r.metodo}</td>
            <td><a class="pdf" onclick="event.stopPropagation()">informe.pdf</a></td>
            <td class="chev">${I.chev}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  window.scrollTo(0,0);
}

/* ---------- Landing render (screens 1,2,3,4,6,7) ---------- */
function renderLanding(){
  const s=state;
  const allDone = s.done.analisis && s.done.resumen && s.done.objetivos;
  const gen = s.generated;
  const generarOn = allDone || gen;
  const resultDone = allDone || gen;
  const showCover = allDone || gen;
  const dateCreate='19 de mayo de 2026';
  const dateUpd = resultDone ? '19 de mayo de 2026' : '-';
  const dateGen = gen ? '19 de mayo de 2026' : '-';
  let metodoCell='-';
  if(gen){
    const label = s.metodo==='ambos' ? 'Correo electrónico y postal' : 'Correo electrónico';
    metodoCell = `<span class="chip">${I.mail} ${label}</span>`;
  }
  // cards: show badges only when done AND not yet in generated state (Figma 6/7 have no badges)
  const badge = (k)=> (!gen && s.done[k]) ? '<span class="badge">Completado</span>' : '';

  const preview = showCover ? coverHTML() : '<div class="pv-empty"></div>';

  el('view').innerHTML = `
  <div class="page">
    <div class="crumbs">
      <span>Clientes</span> ${I.chev}
      <span>Pablo Fernández</span> ${I.chev}
      <a href="#" onclick="goList();return false" style="color:inherit;text-decoration:none">Histórico de análisis</a> ${I.chev}
      <span class="cur">${s.title}</span>
    </div>
    <div class="pagehead">
      <h1>${s.title}</h1>
      <div class="actions">
        <button class="btn" ${gen?'disabled':''}>${I.refresh} Actualizar informe</button>
        <button class="btn">${I.download} Descargar PDF</button>
        <button class="btn primary" ${generarOn?'':'disabled'} onclick="${generarOn?'openModal()':''}">${I.file} Generar informe</button>
      </div>
    </div>

    <div class="landing">
      <div class="side">
        <button class="navcard first" onclick="openAnalisis()">
          <div class="top"><span class="ci">${I.chart}</span>${badge('analisis')}</div>
          <h3>Análisis inicial</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
        <button class="navcard" onclick="openResumen()">
          <div class="top"><span class="ci">${I.doc}</span>${badge('resumen')}</div>
          <h3>Resumen Ejecutivo</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
        <button class="navcard" onclick="completeObjetivos()">
          <div class="top"><span class="ci">${I.target}</span>${badge('objetivos')}</div>
          <h3>Objetivos</h3>
          <span class="arrow">${I.arrow}</span>
        </button>
      </div>

      <div class="main">
        <div class="card resultcard">
          <div class="rc-head">
            <h2>Resultado</h2>
            <span class="status ${resultDone?'done':'pending'}">${resultDone?'Completado':'Pendiente'}</span>
          </div>
          <div class="meta">
            <div><div class="k">Fecha de creación</div><div class="v">${dateCreate}</div></div>
            <div><div class="k">Última actualización</div><div class="v">${dateUpd}</div></div>
            <div><div class="k">Fecha de generación</div><div class="v">${dateGen}</div></div>
            <div><div class="k">Método de envío</div><div class="v">${metodoCell}</div></div>
          </div>
        </div>

        <div class="card previewcard">
          <div class="pv-head">
            <h2>Vista previa del Informe</h2>
            <div class="search">${I.search}<input placeholder="Buscar" /></div>
          </div>
          ${preview}
        </div>
      </div>
    </div>
  </div>`;
}

function coverHTML(){
  return `<div class="cover">
    <div class="cv-top"><span>Qida · Calidad de vida</span><span>16 de julio 2026</span></div>
    <h3>Plan de prevención y reducción de riesgos personalizado</h3>
    <div class="cv-sub">Tu futuro está en tus <i>manos</i></div>
    <div class="cv-pill"><b>45%</b><span>de los casos de demencia podrían prevenirse actuando sobre el estilo de vida.</span></div>
    <div class="cv-line"></div>
    <div class="cv-foot">
      <div><div class="k">Preparado para</div><div class="v">Caro Huet</div></div>
      <div><div class="k">Fecha del plan</div><div class="v">16 de julio de 2026</div></div>
      <div><div class="k">Realizado por</div><div class="v">Qida</div></div>
    </div>
  </div>`;
}

/* ---------- Screen 1.1 : Análisis inicial (form) ---------- */
function openAnalisis(){
  const menu=[['m_ante','Antecedentes',true],['m_clin','Clínica'],['m_func','Funcional'],['m_cogn','Cognitiva'],['m_nutr','Nutricional'],['m_soc','Social']];
  el('view').innerHTML=`
  <div class="page">
    <div class="subhead">
      <button class="back" onclick="renderLanding()">${I.back}</button>
      <h1>Análisis inicial</h1>
    </div>
    <div class="three">
      <div>
        <div class="patient"><div class="pa">PF</div><div><b>Pablo Fernández</b><span>Póliza #VRMC018619GB19</span></div></div>
        <div class="vmenu">
          ${menu.map(m=>`<button class="${m[2]?'active':''}">${I[m[0]]}<span>${m[1]}</span></button>`).join('')}
        </div>
      </div>
      <div class="panel">
        <h2>Antecedentes</h2>
        <div class="fieldgroup">
          <label class="q">Biological Sex <span class="req">*</span></label>
          <div class="selectbox">
            <select><option>Woman</option><option>Man</option></select>
            ${I.chevdown}
          </div>
        </div>
        <div class="fieldgroup">
          <label class="q">Do you have a family history of neurodegenerative diseases? <span class="req">*</span></label>
          <div class="radios">
            <label class="radio"><input type="radio" name="fam"> Yes</label>
            <label class="radio"><input type="radio" name="fam" checked> No</label>
          </div>
        </div>
      </div>
      <div class="notespanel">
        <h4>Notas globales de la llamada</h4>

      <button class="btn primary" onclick="saveAnalisis()">Guardar y volver atrás</button>

  </div>`;
  window.scrollTo(0,0);
}
function saveAnalisis(){ state.done.analisis=true; renderLanding(); }

/* ---------- Screen 2.1 : Resumen Ejecutivo (editor) ---------- */
function openResumen(){
  const tabs=[['m_nutr','Nutricional',true],['m_cogn','Cognitivo'],['m_act','Actividad Física'],['m_emo','Emocional'],['m_soc','Social'],['m_aud','Auditivo y ocular'],['m_tab','Tabaco y alcohol']];
  const vals=Array.from({length:11},(_,i)=>`<button class="val ${i===8?'sel':''}">${i}</button>`).join('');
  el('view').innerHTML=`
  <div class="page">
    <div class="subhead">
      <button class="back" onclick="renderLanding()">${I.back}</button>
      <h1>Resumen Ejecutivo</h1>
    </div>
    <div class="three">
      <div>
        <div class="vmenu">
          ${tabs.map(t=>`<button class="${t[2]?'active':''}">${I[t[0]]}<span>${t[1]}</span></button>`).join('')}
        </div>
        <div style="margin-top:16px;color:var(--n700)">${I.collapse}</div>
      </div>
      <div class="panel">
        <h2>Nutricional</h2>
        <div class="subcard">
          <h4>Valoración</h4>
          <div class="valoracion">${vals}</div>
        </div>
        <div class="subcard">
          <h4>Resumen Ejecutivo</h4>
          <div class="resumen-text">${DATA.resumenText}</div>
          <div class="adjust"><input placeholder="Ajustar resumen..."><button class="send">${I.sendup}</button></div>
        </div>
        <div class="subcard collap">
          <h4 onclick="this.nextElementSibling.classList.toggle('hidden')">Notas globales de la llamada ${I.chevdown}</h4>
          <div class="notes-body">${DATA.notas}</div>
        </div>
      </div>
      <div>
        <div class="patient"><div class="pa">PF</div><div><b>Pablo Fernández</b><span>Póliza #VRMC018619GB19</span></div></div>
        <div class="metrics">
          ${DATA.metrics.map(m=>`<div class="row"><span class="k">${m[0]}</span><span class="v">${m[1]}</span></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="subfoot">
      <button class="btn primary" onclick="saveResumen()">Guardar</button>
    </div>
  </div>`;
  window.scrollTo(0,0);
}
function saveResumen(){ state.done.resumen=true; renderLanding(); }

/* ---------- Objetivos (no detail screen in scope) ---------- */
function completeObjetivos(){ state.done.objetivos=true; renderLanding(); }

/* ---------- Screen 5 : modal Generar informe ---------- */
function openModal(){
  const ov=document.createElement('div');
  ov.className='overlay open'; ov.id='overlay';
  ov.innerHTML=`
    <div class="modal">
      <div class="mh"><h3>Generar informe</h3><button class="x" onclick="closeModal()">${I.x}</button></div>
      <p>El informe queda registrado una vez generado. Es necesario indicar el método de envío del informe.</p>
      <div class="lbl">Método de envío</div>
      <label class="opt"><input type="radio" name="metodo" value="email"> Enviar por correo electrónico</label>
      <label class="opt"><input type="radio" name="metodo" value="ambos"> Enviar por correo electrónico y correo postal</label>
      <div class="mfoot">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn primary" onclick="sendReport()">${I.send} Enviar informe</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}
function closeModal(){ const o=el('overlay'); if(o) o.remove(); }
function sendReport(){
  const sel=document.querySelector('input[name="metodo"]:checked');
  state.metodo = sel ? sel.value : 'email';
  state.generated=true;
  closeModal();
  renderLanding();
}

/* boot */
renderList();
</script>
